<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 네이버 서치어드바이저  -->
  <meta name="naver-site-verification" content="0151cd7583dfa9db2233504566b997aa77fe2608" />

  <!-- react-helmet-async가 작동하기 전을 대비해 아래와 같이 기본이 되는 정보를 남겨둬야함  -->
  <title>DevFlow | 스타트업을 위한 스마트 협업 플랫폼</title>

  <!-- SEO 그룹 (검색 엔진용): description, robots - 구글이나 네이버 검색 결과에 우리 사이트가 어떤 곳인지 설명해 줍니다. -->
  <meta name="description" content="DevFlow는 소규모 팀과 스타트업을 위한 가벼운 협업 도구입니다. 프로젝트 관리, 칸반 보드, 실시간 메시징을 한곳에서 경험하세요." />

  <!-- OG(Open Graph) 그룹 (SNS 공유용): og:title, og:description, og:image, og:url
  - 카카오톡, 슬랙, 디스코드에 링크를 복사했을 때 미리보기 카드를 만들어 줍니다. 이게 없으면 링크만 덜렁 떠서 클릭률이 떨어집니다. 
  -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="DevFlow - 가벼운 협업의 시작" />
  <meta property="og:description" content="팀원들과 실시간으로 업무를 공유하고 프로젝트를 완성하세요." />
  <!-- 아래의 image는 이미지가 생기면 넣기 -->
  <!-- <meta property="og:image" content="https://your-domain.com/og-image.png" /> <meta property="og:url" content="https://your-domain.com" /> -->

  <!-- 이건 트위터 전용 - 트위터는 별도의 규격을 사용하므로, 소셜 마케팅까지 고려한다면 포함하는 것이 정석입니다. -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DevFlow" />
  <meta name="twitter:description" content="스타트업을 위한 최적의 협업 플랫폼" />
  <meta name="twitter:image" content="https://your-domain.com/og-image.png" />

  <meta name="robots" content="index, follow" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
